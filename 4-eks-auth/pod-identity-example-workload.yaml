apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-identity-demo
  namespace: default
  labels:
    app.kubernetes.io/name: pod-identity-demo
    app.kubernetes.io/part-of: eks-auth-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-identity-demo
  namespace: default
  labels:
    app.kubernetes.io/name: pod-identity-demo
    app.kubernetes.io/part-of: eks-auth-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pod-identity-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pod-identity-demo
        app.kubernetes.io/part-of: eks-auth-lab
    spec:
      serviceAccountName: pod-identity-demo
      containers:
        - name: aws-cli
          image: amazon/aws-cli:2.15.39
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2          
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                date
                echo "=== Pod Identity check ==="
                echo "AWS_REGION=${AWS_REGION:-unset}"
                echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-unset}"
                echo "AWS_CONTAINER_CREDENTIALS_FULL_URI=${AWS_CONTAINER_CREDENTIALS_FULL_URI:-unset}"
                echo "AWS_CONTAINER_AUTHORIZATION_TOKEN_FILE=${AWS_CONTAINER_AUTHORIZATION_TOKEN_FILE:-unset}"
                echo "AWS_WEB_IDENTITY_TOKEN_FILE=${AWS_WEB_IDENTITY_TOKEN_FILE:-unset}"
                echo "AWS_ROLE_ARN=${AWS_ROLE_ARN:-unset}"
                echo "--- sts get-caller-identity ---"
                aws sts get-caller-identity || true
                echo "--- s3api list-buckets ---"
                aws s3api list-buckets --query 'Buckets[].Name' --output text || true
                echo
                sleep 30
              done

